<!DOCTYPE html>
<html>
<head>
    <title>Contact</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Contact Me</h1>
    </header>
    
    <div>
        <h2>Get In Touch</h2>
        
        <form>
            <div>
                <label for="name">Name</label>
                <input type="text" name="Name" id="name" required>
            </div>
            <div>
                <labels for="email">Email</labels>
                <input type="email" name="email" id="email" required>
            </div>
            <div>
                <labels for="phone">Phone Number</labels>
                <input type="tel" name="phone" id="phone" pattern="[0-9]{10}" placeholder="0721234567">
            </div>
            <div>
                <labels for="message">Your Message</labels><br>
                <textarea name="message" id="message" rows="4" maxlength="100">Enter your message here</textarea>
            </div>
            
            <button type="submit">Send</button>
        </form>
    </div>
    
    <footer>
        <p>Contact me at matshidiso.moshoeshoe@umuzi.org</p>
    </footer>
</body>
</html>
