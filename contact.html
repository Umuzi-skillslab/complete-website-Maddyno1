<!DOCTYPE html>
<html>

<head>
    <title>Contact</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body id="contact">
    <header div class="contact">
        <h1>Contact Me</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div>
            <h2>Get In Touch</h2>

            <form>
                <div>
                    <label for="name">Name</label>
                    <input type="text" name="Name" id="name" required>
                </div>
                <div>
                    <labels for="email">Email</labels>
                    <input type="email" name="email" id="email" required>
                </div>
                <div>
                    <labels for="phone">Phone Number</labels>
                    <input type="tel" name="phone" id="phone" pattern="[0-9]{10}" placeholder="0721234567">
                </div>
                <div>
                    <labels for="message">Your Message</labels><br>
                    <textarea name="message" id="message" rows="4" maxlength="100" placeholder="Enter your message here"></textarea>
                </div>

                <button type="submit">Send</button>
            </form>
        </div>
        <div class="push"></div>
    </main>

    <footer>
        <p>Contact me at matshidiso.moshoeshoe@umuzi.org</p>
    </footer>
</body>

</html>
